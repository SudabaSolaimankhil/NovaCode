<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <title>Document</title>
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
<link rel="stylesheet" href="./main.css">

<body>

  <!--samaneh-->




  <section class="contact-section py-5">

    <div class="blur blur-one"></div>
    <div class="blur blur-two"></div>

    <div class="container">

      <div class="row align-items-center gy-5">

        <!-- LEFT -->

        <div class="col-lg-5">

          <span class="contact-tag">
            Contact Us
          </span>

          <h2 class="contact-title">
            Let's Build Something Amazing Together.
          </h2>

          <p class="contact-text">
            We'd love to hear from you. Whether you have a question,
            an idea, or just want to say hello, our team is ready.
          </p>

          <div class="info-card">

            <div class="icon-box">
              <i class="fa-solid fa-location-dot"></i>
            </div>

            <div>
              <h6>Location</h6>
              <p>Herat, Afghanistan</p>
            </div>

          </div>

          <div class="info-card">

            <div class="icon-box">
              <i class="fa-solid fa-envelope"></i>
            </div>

            <div>
              <h6>Email</h6>
              <p>novacode@gmail.com</p>
            </div>

          </div>

          <div class="info-card">

            <div class="icon-box">
              <i class="fa-solid fa-phone"></i>
            </div>

            <div>
              <h6>Phone</h6>
              <p>+93 700 000 000</p>
            </div>

          </div>

        </div>

        <!-- RIGHT -->

        <div class="col-lg-7">

          <div class="contact-form">

            <h3>Send Message</h3>

            <form>

              <div class="row">

                <div class="col-md-6 mb-4">

                  <input type="text" class="form-control" placeholder="Your Name">

                </div>

                <div class="col-md-6 mb-4">

                  <input type="email" class="form-control" placeholder="Email">

                </div>

                <div class="col-12 mb-4">

                  <input type="text" class="form-control" placeholder="Subject">

                </div>

                <div class="col-12 mb-4">

                  <textarea rows="6" class="form-control" placeholder="Write your message..."></textarea>

                </div>

                <div class="col-12">

                  <button class="contact-btn">

                    Send Message

                    <i class="fa-solid fa-arrow-right ms-2"></i>

                  </button>

                </div>

              </div>

            </form>

          </div>

        </div>

      </div>

    </div>

  </section>


  <!--samaneh-->
 
</body>

</html>
